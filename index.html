<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToolVerse AI</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav>
        <div class="logo">ToolVerse AI</div>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">Category</a></li>
            <li><a href="#">About</a></li>
        </ul>
    </nav>

    <main>
        <section class="hero">
            <h1>Discover the Best AI Tools</h1>
            <p>
                Find the perfect AI tool for coding, writing, design, productivity, and much more.
            </p>
            <button>Explore Tools</button>
            <div class="search-box">
                <input type="text" placeholder="Search AI tools...">
                <button>Search</button>
            </div>
        </section>
    </main>

    <section class="categories">
        <h2>Popular Categories</h2>
        <div class="category-container">
            <div class="category-card">Coding</div>
            <div class="category-card">Writing</div>
            <div class="category-card">Image</div>
            <div class="category-card">Video</div>
            <div class="category-card">Audio</div>
            <div class="category-card">Education</div>
        </div>
    </section>
   <script src="js/app.js"></script> 
</body>
</html>
